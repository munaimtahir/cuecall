name: Build (Debug / Release)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to assemble'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  assemble:
    name: Assemble ${{ github.event.inputs.build_type }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Resolve Gradle task name
        id: task
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          # Capitalise first letter so the task name matches Gradle conventions
          TASK="assemble${BUILD_TYPE^}"
          echo "name=${TASK}" >> "$GITHUB_OUTPUT"

      - name: Assemble ${{ github.event.inputs.build_type }} APK
        run: ./gradlew ${{ steps.task.outputs.name }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type }}
          path: app/build/outputs/apk/${{ github.event.inputs.build_type }}/*.apk
          if-no-files-found: error
